name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-mdparser --enable-mdparser-dev
          WARNINGS=$(make -j$(nproc) 2>&1 | tee /dev/stderr | grep -c 'warning:' || true)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::Build produced $WARNINGS warning(s)"
            exit 1
          fi

      - name: Run tests
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/mdparser.so"
          export NO_INTERACTION=1
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1)
          echo "$RESULT"
          FAILED=$(echo "$RESULT" | grep 'Tests failed' | grep -oP '\d+' | head -1)
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi

  macos:
    name: PHP ${{ matrix.php }} - macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-mdparser
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/mdparser.so"
          export NO_INTERACTION=1
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1)
          echo "$RESULT"
          FAILED=$(echo "$RESULT" | grep 'Tests failed' | grep -oP '\d+' | head -1)
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      USE_TRACKED_ALLOC: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang re2c bison autoconf

      - name: Build PHP with ASAN
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined" \
          ./configure \
            --enable-debug \
            --enable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-asan
          make -j$(nproc)
          make install

      - name: Build extension with ASAN
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined" \
          ./configure \
            --enable-mdparser \
            --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        run: |
          export LD_PRELOAD=$(clang -print-file-name=libclang_rt.asan-x86_64.so)
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/mdparser.so"
          export NO_INTERACTION=1
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1 | tee /tmp/test-output.txt || true
          if grep -qP 'Tests failed\s*:\s*[1-9]' /tmp/test-output.txt; then
            echo "::error::Tests failed under ASAN"
            exit 1
          fi
